name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # Postgres service so the tenancy / GDPR / jobs / ark integration suites RUN in CI — without a
    # TEST_DATABASE_URL they SKIP, which is exactly the security-critical coverage we were missing.
    # Passwordless (trust auth) to match the local-stand convention (postgres@… , no password);
    # localhost → no TLS (PGSSL=disable).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: pulse
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # TEST_DATABASE_URL flips the integration suites on. DATABASE_URL is deliberately left UNSET
      # at the job level so the DB-less unit tests keep their DB-less path (they opt in per-file).
      TEST_DATABASE_URL: postgresql://postgres@localhost:5432/pulse
      PGSSL: disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Build shared narrative engine
        run: |
          npm ci --prefix frontend
          npm run build:shared --prefix frontend
      # Apply migrations BEFORE the suite: the integration tests expect the schema present
      # (they INSERT into users/workspaces/channels/jobs — they do not self-migrate).
      - name: Migrate CI database
        run: node server/migrate.js
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/pulse
      - run: npm run check
      - run: python -m py_compile mtproto/service.py collector/pulse_collector.py
      - run: python -m unittest discover -s test -p "test_*.py"
      - name: Parse inline browser scripts
        run: |
          node - <<'NODE'
          const fs = require('fs'), vm = require('vm');
          const html = fs.readFileSync('public/index.html', 'utf8');
          const re = /<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/gi;
          let match;
          while ((match = re.exec(html))) new vm.Script(match[1]);
          NODE

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: node scripts/check-bundle-size.mjs
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        run: npm run test:e2e:smoke
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-smoke-${{ github.run_attempt }}
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7
