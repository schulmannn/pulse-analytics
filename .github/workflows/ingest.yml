name: Daily history snapshot

# Снимает дневные метрики канала в Postgres сверх 3-месячного окна Telegram.
# Требует секрет INGEST_TOKEN (тот же, что в переменных Railway-сервиса).
on:
  schedule:
    - cron: '0 3 * * *'   # ежедневно 03:00 UTC (06:00 МСК)
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingestion endpoint
        env:
          BASE: https://atlavue.app
          TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: |
          set -e
          if [ -z "$TOKEN" ]; then echo "INGEST_TOKEN secret is empty"; exit 1; fi
          # token via header (avoids URL-encoding issues with +,/,= in the token)
          code=$(curl -sS -o /tmp/out -w "%{http_code}" -X POST -H "x-ingest-token: $TOKEN" "$BASE/api/ingest/daily")
          echo "HTTP $code"; cat /tmp/out; echo
          # Silent-death guard: a degraded day (archive did not grow — upstream MTProto /graphs
          # failed, channel_daily=0) now answers 503 with the jobs row marked FAILED, so re-running
          # this workflow the same day retries the heavy pass. Non-200 fails the job → GitHub's
          # native workflow-failure email fires.
          test "$code" = "200"
          # Belt-and-braces: any residual 200 body carrying degraded must still fail loudly.
          if grep -q '"degraded":true' /tmp/out; then
            echo "::error::ingest degraded — archive did not grow (upstream MTProto likely down)"; exit 1
          fi
